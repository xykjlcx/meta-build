# Test profile — Testcontainers 动态注入 datasource 和 redis
# spring.datasource.* 和 spring.data.redis.* 由 @DynamicPropertySource 覆盖
spring:
  flyway:
    clean-disabled: false

mb:
  rate-limit:
    enabled: false
  captcha:
    enabled: false

sa-token:
  is-log: false
  jwt-secret-key: test-jwt-secret-key-for-testing

springdoc:
  api-docs:
    enabled: false

# 测试环境 actuator 回到主端口（MockMvc 测试需要通过主 dispatcher 访问）
management:
  server:
    port:

logging:
  level:
    com.metabuild: DEBUG
    org.testcontainers: WARN
