# Test profile — Testcontainers 动态注入 datasource 和 redis
# spring.datasource.* 和 spring.data.redis.* 由 @DynamicPropertySource 覆盖
spring:
  flyway:
    clean-disabled: false

mb:
  rate-limit:
    enabled: false
  captcha:
    enabled: false

sa-token:
  is-log: false

springdoc:
  api-docs:
    enabled: false

logging:
  level:
    com.metabuild: DEBUG
    org.testcontainers: WARN
