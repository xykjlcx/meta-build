# Test profile — Testcontainers 动态注入 datasource 和 redis
# spring.datasource.* 和 spring.data.redis.* 由 @DynamicPropertySource 覆盖
spring:
  flyway:
    clean-disabled: false

mb:
  rate-limit:
    enabled: false
  captcha:
    enabled: false

sa-token:
  is-log: false
  jwt-secret-key: test-jwt-secret-key-for-testing

# 默认禁用 springdoc 省其他测试启动时间；OpenapiSnapshotTest 通过 @TestPropertySource 单测强开
springdoc:
  api-docs:
    enabled: false

logging:
  level:
    com.metabuild: DEBUG
    org.testcontainers: WARN
