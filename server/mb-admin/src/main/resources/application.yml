spring:
  application:
    name: meta-build
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 数据源
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/metabuild}
    username: ${SPRING_DATASOURCE_USERNAME:metabuild}
    password: ${SPRING_DATASOURCE_PASSWORD:metabuild}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # Jackson
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# jOOQ 自定义配置
mb:
  jooq:
    slow-query-threshold-ms: ${MB_JOOQ_SLOW_QUERY_THRESHOLD_MS:500}
  id:
    worker: ${MB_ID_WORKER:0}
    datacenter: ${MB_ID_DATACENTER:0}

# Actuator
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true

# Server
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
