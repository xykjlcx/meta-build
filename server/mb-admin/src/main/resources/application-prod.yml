# Prod profile — 所有敏感配置通过环境变量注入，无默认值（fail-fast）
spring:
  datasource:
    url: jdbc:postgresql://${MB_DB_HOST}:${MB_DB_PORT}/${MB_DB_NAME}
    username: ${MB_DB_USERNAME}
    password: ${MB_DB_PASSWORD}
  flyway:
    clean-disabled: true
  data:
    redis:
      host: ${MB_REDIS_HOST}
      port: ${MB_REDIS_PORT}
      password: ${MB_REDIS_PASSWORD}

mb:
  cors:
    allowed-origins: ${MB_CORS_ALLOWED_ORIGINS}

sa-token:
  is-log: false

# 生产环境 Actuator：仅暴露只读端点，排除 loggers（运行时修改日志级别有安全风险）
# 独立端口 + 绑本地回环，避免暴露给公网；K8s Service / nginx 别转发到 9090
management:
  server:
    port: ${MB_MANAGEMENT_PORT:9090}
    address: ${MB_MANAGEMENT_ADDRESS:127.0.0.1}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Logging: JSON for prod
logging:
  level:
    com.metabuild: INFO
    org.jooq: WARN
