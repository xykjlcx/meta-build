name: Client CI

on:
  push:
    paths: ['client/**', '.github/workflows/client.yml']
  pull_request:
    paths: ['client/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      # api-sdk 生成（从 openapi-v1.json 生成 TanStack Query hooks）
      - name: Generate api-sdk
        working-directory: client
        run: pnpm generate:api-sdk

      # drift 检测：确认生成代码没有未提交的变更
      - name: Check api-sdk drift
        run: |
          git diff --exit-code -- client/packages/api-sdk/src/generated/ || \
            (echo "ERROR: api-sdk generated code is out of sync with openapi-v1.json" && exit 1)

      - name: TypeScript strict check
        working-directory: client
        run: pnpm check:types

      - name: Biome lint & format
        working-directory: client
        run: pnpm lint

      - name: Stylelint CSS check
        working-directory: client
        run: pnpm lint:css

      - name: Dependency direction check
        working-directory: client
        run: pnpm check:deps

      - name: Env example consistency
        working-directory: client
        run: pnpm check:env
