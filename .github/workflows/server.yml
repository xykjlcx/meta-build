name: Server CI

on:
  push:
    paths: ['server/**', '.github/workflows/server.yml']
  pull_request:
    paths: ['server/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Verify
        working-directory: server
        run: mvn -B verify
